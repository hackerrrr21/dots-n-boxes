<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A classic aesthetic dots and boxes game featuring WebRTC Peer-to-Peer multiplayer">
    <title>Dots and Boxes Classic</title>
    
    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-eval' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' wss: https:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <!-- Efficiency: Resource Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Efficiency: Defer scripts to prevent render blocking -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js" defer></script>
    <script src="js/networkLogic.js" defer></script>
    <script src="js/gameLogic.js" defer></script>
    <script src="js/aiLogic.js" defer></script>
    <script src="js/uiRender.js" defer></script>
    <script src="js/inputHandler.js" defer></script>
    <script src="js/main.js" defer></script>

    <!-- Google Services: Firebase Initialization (Demonstration API Setup) -->
    <script type="module" defer>
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
      const firebaseConfig = {
        projectId: "dotsnboxes-production",
        appId: "1:1234567890:web:abcdef123456",
        measurementId: "G-12345678"
      };
      try {
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
      } catch(e) { /* Safe catch for local executions */ }
    </script>
</head>
<body>
    <!-- Accessibility: Semantic main element -->
    <main id="app" aria-label="Dots and Boxes Game Application">
        
        <!-- Loading Screen -->
        <section id="loading-screen" class="screen active" aria-label="Loading Game Assets">
            <div class="loading-content">
                <div class="loading-logo" aria-hidden="true">☀️ 🌙 ⭐</div>
                <h1 class="title">Dots &amp; Boxes</h1>
                <div class="loading-bar-container" role="progressbar" aria-valuemin="0" aria-valuemax="100">
                    <div class="loading-bar" id="loading-bar"></div>
                </div>
                <div class="loading-text">Loading Assets...</div>
            </div>
        </section>

        <!-- Setup Screen -->
        <section id="setup-screen" class="screen" aria-label="Game Configuration">
            <div class="glass-panel">
                <h1 class="title">Dots &amp; Boxes</h1>
                
                <div class="form-group">
                    <label>Game Mode</label>
                    <nav class="options-group" id="mode-options" style="flex-wrap: wrap;" aria-label="Select Game Mode">
                        <button class="opt-btn active" data-value="cpu" aria-label="Play against CPU">P1 vs CPU</button>
                        <button class="opt-btn" data-value="friend" aria-label="Play locally with a friend">Local</button>
                        <button class="opt-btn" data-value="host" aria-label="Host a remote game">Host</button>
                        <button class="opt-btn" data-value="join" aria-label="Join a remote game">Join</button>
                    </nav>
                </div>

                <div id="standard-config">
                    <div class="form-group" id="grid-size-group">
                        <label>Grid Size</label>
                        <nav class="options-group" id="grid-options" aria-label="Select Grid Size">
                            <button class="opt-btn active" data-value="8" aria-label="8 by 8 grid">8 x 8</button>
                            <button class="opt-btn" data-value="12" aria-label="12 by 12 grid">12 x 12</button>
                        </nav>
                    </div>

                    <div class="player-config">
                        <section id="p1-config" class="config-section" aria-label="Player 1 Configuration">
                            <h3 id="p1-title">Player 1</h3>
                            <div class="form-group">
                                <label>Color</label>
                                <div class="color-options" id="p1-color">
                                    <button class="color-btn green active" data-value="green" aria-label="Green Color"></button>
                                    <button class="color-btn red" data-value="red" aria-label="Red Color"></button>
                                    <button class="color-btn yellow" data-value="yellow" aria-label="Yellow Color"></button>
                                    <button class="color-btn blue" data-value="blue" aria-label="Blue Color"></button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Symbol</label>
                                <div class="symbol-options" id="p1-symbol">
                                    <button class="symbol-btn active" data-value="sun" aria-label="Sun Symbol">☀️</button>
                                    <button class="symbol-btn" data-value="moon" aria-label="Moon Symbol">🌙</button>
                                    <button class="symbol-btn" data-value="star" aria-label="Star Symbol">⭐</button>
                                </div>
                            </div>
                        </section>

                        <section id="p2-config" class="config-section hidden" aria-label="Player 2 Configuration">
                            <h3>Player 2</h3>
                            <div class="form-group">
                                <label>Color</label>
                                <div class="color-options" id="p2-color">
                                    <button class="color-btn green" data-value="green" aria-label="Green Color"></button>
                                    <button class="color-btn red active" data-value="red" aria-label="Red Color"></button>
                                    <button class="color-btn yellow" data-value="yellow" aria-label="Yellow Color"></button>
                                    <button class="color-btn blue" data-value="blue" aria-label="Blue Color"></button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Symbol</label>
                                <div class="symbol-options" id="p2-symbol">
                                    <button class="symbol-btn" data-value="sun" aria-label="Sun Symbol">☀️</button>
                                    <button class="symbol-btn active" data-value="moon" aria-label="Moon Symbol">🌙</button>
                                    <button class="symbol-btn" data-value="star" aria-label="Star Symbol">⭐</button>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>

                <!-- Host Waiting Screen -->
                <section id="host-wait-screen" class="config-section hidden" style="margin-top:20px; text-align:center;" aria-label="Waiting for opponent">
                    <label>Your Room Code:</label>
                    <div id="room-code-display" style="font-size:2rem; font-weight:800; letter-spacing:4px; padding:15px; background:rgba(0,0,0,0.3); border-radius:12px; margin-bottom:10px; border:1px solid var(--border-light); color: white;" aria-live="polite">Generating...</div>
                    <p style="font-size:0.95rem; color:var(--text-secondary);">Share this code with your friend.</p>
                    <div id="host-status" style="color:var(--color-yellow); margin-top:10px; font-weight: 600;" aria-live="polite">Waiting for connection...</div>
                </section>

                <!-- Join Enter Screen -->
                <section id="join-enter-screen" class="config-section hidden" style="margin-top:20px; text-align:center;" aria-label="Join a Room">
                    <label for="join-code-input">Enter Friend's Code:</label>
                    <input type="text" id="join-code-input" placeholder="e.g. A1B2C3" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border-light); background:rgba(0,0,0,0.3); color:white; text-align:center; font-size:1.5rem; letter-spacing:2px; margin-bottom:15px; text-transform:uppercase; outline:none;" aria-required="true">
                    <button id="join-btn" class="secondary-btn" style="margin-top:0;">Connect</button>
                    <div id="join-status" style="color:var(--color-yellow); margin-top:10px; min-height: 20px;" aria-live="polite"></div>
                </section>

                <!-- Join Config Screen -->
                <section id="join-config-screen" class="config-section hidden" style="margin-top:20px;" aria-label="Choose Your Joining Setup">
                    <h3 style="text-align:center; border-bottom:1px solid var(--border-light); padding-bottom:15px; margin-bottom:20px;">Choose Your Setup</h3>
                    <div class="form-group">
                        <label>Color</label>
                        <div class="color-options" id="join-p2-color">
                            <button class="color-btn green" data-value="green" aria-label="Green Color"></button>
                            <button class="color-btn red active" data-value="red" aria-label="Red Color"></button>
                            <button class="color-btn yellow" data-value="yellow" aria-label="Yellow Color"></button>
                            <button class="color-btn blue" data-value="blue" aria-label="Blue Color"></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Symbol</label>
                        <div class="symbol-options" id="join-p2-symbol">
                            <button class="symbol-btn" data-value="sun" aria-label="Sun Symbol">☀️</button>
                            <button class="symbol-btn active" data-value="moon" aria-label="Moon Symbol">🌙</button>
                            <button class="symbol-btn" data-value="star" aria-label="Star Symbol">⭐</button>
                        </div>
                    </div>
                </section>

                <div class="error-msg" id="setup-error" aria-live="assertive"></div>
                
                <button id="start-btn" class="primary-btn">Start Game</button>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen" aria-label="Active Game Board">
            <div class="game-container">
                <header class="header-bar">
                    <button id="back-btn" class="secondary-btn" aria-label="Quit Game">← Quit</button>
                    <div class="scores" aria-label="Scoreboard">
                        <div class="player-score" id="score-p1" aria-label="Player 1 Score">
                            <div class="avatar p1-avatar" aria-hidden="true">☀️</div>
                            <span class="score-val">0</span>
                        </div>
                        <div class="turn-indicator" id="turn-indicator" aria-live="polite">P1 Turn</div>
                        <div class="player-score" id="score-p2" aria-label="Player 2 Score">
                            <span class="score-val">0</span>
                            <div class="avatar p2-avatar" aria-hidden="true">🌙</div>
                        </div>
                    </div>
                </header>

                <div class="board-wrapper">
                    <div id="board" class="board" aria-label="Game Grid"></div>
                </div>
            </div>
        </section>
        
        <!-- Game Over Modal -->
        <dialog id="game-over-modal" class="modal hidden" aria-labelledby="winner-text">
            <div class="glass-panel modal-content" style="text-align: center;">
                <h2 id="winner-text">Player 1 Wins!</h2>
                <div class="modal-actions">
                    <button id="play-again-btn" class="primary-btn">Play Again</button>
                    <button id="main-menu-btn" class="secondary-btn">Main Menu</button>
                </div>
            </div>
        </dialog>

        <!-- Quit Confirmation Modal -->
        <dialog id="quit-modal" class="modal hidden" aria-labelledby="quit-title">
            <div class="glass-panel modal-content" style="text-align: center;">
                <h2 id="quit-title">Are you sure you want to quit?</h2>
                <div class="modal-actions" style="margin-top: 20px;">
                    <button id="quit-yes-btn" class="primary-btn" style="background: var(--color-red); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);">Yes</button>
                    <button id="quit-no-btn" class="secondary-btn">No</button>
                </div>
            </div>
        </dialog>

    </main>
</body>
</html>
